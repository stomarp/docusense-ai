services:
  db:
    image: postgres:16
    container_name: docusense_db
    environment:
      POSTGRES_USER: docusense
      POSTGRES_PASSWORD: docusense
      POSTGRES_DB: docusense
    ports:
      - "5434:5432"
    volumes:
      - docusense_pgdata:/var/lib/postgresql/data

volumes:
  docusense_pgdata:
