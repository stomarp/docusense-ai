services:
  - type: web
    name: docusense-ai-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: LLM_ENABLED
        value: "false"
      - key: FRONTEND_URL
        value: https://docusense-ai-six.vercel.app
      - key: CORS_ORIGINS
        value: https://docusense-ai-six.vercel.app
